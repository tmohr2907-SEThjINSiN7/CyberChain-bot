<!DOCTYPE html><html><head><style>body{background:#050508;color:!GLOW_COLOR!;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden;} .dash{background:rgba(21,24,33,0.9);padding:20px;border:2px solid !GLOW_COLOR!;text-align:center;box-shadow:0 0 30px rgba(!R_COL!,!G_COL!,0,0.3);border-radius:10px;} canvas{background:#000;border:1px solid #333;margin:15px 0;box-shadow:0 0 15px !GLOW_COLOR!;} .stat{font-size:1.2em;}</style></head><body><div class="dash"><h2>CYBER-CORE GEN: !GEN_COUNT!</h2><div class="stat">BTC: <span id="btc">0.0000</span></div><canvas id="g" width="400" height="400"></canvas></div><script>const c=document.getElementById("g"),x=c.getContext("2d"),g=!RND_SIZE!;let sn=[{x:200,y:200}],dx=g,dy=0,nf=parseFloat(localStorage.getItem("btc"))||0,ax=100,ay=100;function m(){let h={x:sn[0].x,y:sn[0].y};if(h.x<ax)dx=g,dy=0;else if(h.x>ax)dx=-g,dy=0;else if(h.y<ay)dx=0,dy=-g;else if(h.y>ay)dx=0,dy=g;h.x+=dx;h.y+=dy;if(h.x<0)h.x=400-g;if(h.x>=400)h.x=0;if(h.y<0)h.y=400-g;if(h.y>=400)h.y=0;sn.unshift(h);if(Math.abs(h.x-ax)<1 && Math.abs(h.y-ay)<1){nf+=0.0001;localStorage.setItem("btc",nf);ax=Math.floor(Math.random()*(400/g))*g;ay=Math.floor(Math.random()*(400/g))*g;}else{sn.pop();}x.fillStyle="#000";x.fillRect(0,0,400,400);x.fillStyle="#ff3366";x.beginPath();x.arc(ax+g/2,ay+g/2,g/3,0,7);x.fill();x.fillStyle="!GLOW_COLOR!";sn.forEach((p,i)=>{x.globalAlpha=i==0?1:0.5;x.fillRect(p.x,p.y,g-1,g-1);});document.getElementById("btc").innerText=nf.toFixed(4);setTimeout(m,!RND_SPEED!);}m();</script></body></html>
